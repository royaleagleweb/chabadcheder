name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug and Deploy
        run: |
          echo "=== Verifying token ==="
          curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          echo "=== Getting account ==="
          ACCOUNT_RESP=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          echo "$ACCOUNT_RESP"
          ACCOUNT_ID=$(echo "$ACCOUNT_RESP" | jq -r '.result[0].id // empty')
          echo "Account ID: $ACCOUNT_ID"
          echo "=== Deploying ==="
          npx wrangler@latest deploy --account-id=$ACCOUNT_ID 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug and Deploy
        run: |
          {
            echo "=== Token verify ==="
            curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
            echo ""
            echo "=== Accounts ==="
            ACCOUNT_RESP=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            echo "$ACCOUNT_RESP"
            ACCOUNT_ID=$(echo "$ACCOUNT_RESP" | jq -r '.result[0].id // empty')
            echo "Account ID: [$ACCOUNT_ID]"
            echo "=== Wrangler deploy ==="
            npx wrangler@latest deploy --account-id=$ACCOUNT_ID 2>&1 || true
          } | tee /tmp/deploy-output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-output
          path: /tmp/deploy-output.txt

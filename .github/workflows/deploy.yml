name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy
        continue-on-error: true
        run: |
          npx wrangler@latest pages deploy ./ \
            --project-name=chabadcheder \
            --account-id=2b8bb2834c3942b88a71e4f6e2b968e2 \
            --commit-dirty=true 2>&1 | tee deploy-output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Save output
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/royaleagleweb/chabadcheder.git
          git add deploy-output.txt
          git diff --staged --quiet || git commit -m "chore: deploy output [skip ci]"
          git push
